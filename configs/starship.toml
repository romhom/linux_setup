# =============================================================================
# Starship prompt config — Python dev focused
# Docs: https://starship.rs/config/
# =============================================================================

# Overall format — what shows on each line
format = """
[╭─](bold dimmed white)$os$username$hostname$directory$git_branch$git_status$git_state\
$python$conda$docker_context$jobs
[╰─](bold dimmed white)$character"""

# ── Prompt character ──────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold yellow)"

# ── OS icon ───────────────────────────────────────────────────────────────────
[os]
disabled = false
style = "bold blue"

[os.symbols]
Linux    = " "
Debian   = " "
Ubuntu   = " "
Windows  = " "
Macos    = " "

# ── Username (only shown when not the default user or when SSH) ───────────────
[username]
show_always = false
style_user  = "bold cyan"
style_root  = "bold red"
format      = "[$user]($style) "

# ── Hostname (only shown over SSH) ────────────────────────────────────────────
[hostname]
ssh_only = true
style    = "bold yellow"
format   = "[@$hostname]($style) "

# ── Directory ─────────────────────────────────────────────────────────────────
[directory]
style             = "bold cyan"
truncation_length = 4
truncate_to_repo  = true
read_only         = " 󰌾"
format            = "[$path]($style)[$read_only]($read_only_style) "

[directory.substitutions]
"~"                             = "󰋜 "
"/mnt/chromeos/MyFiles"         = "󰊢 ChromeOS"
"/mnt/chromeos/MyFiles/Downloads" = "󰊢 Downloads"

# ── Git ───────────────────────────────────────────────────────────────────────
[git_branch]
symbol = " "
style  = "bold purple"
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_status]
style     = "bold yellow"
format    = "([$all_status$ahead_behind]($style) )"
ahead     = "⇡${count}"
behind    = "⇣${count}"
diverged  = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed   = "󰏗 ${count}"
modified  = "!${count}"
staged    = "+${count}"
deleted   = "✘${count}"
conflicted = "=${count}"

[git_state]
style  = "bold red"
format = "[$state($progress_current/$progress_total)]($style) "

# ── Python ────────────────────────────────────────────────────────────────────
[python]
symbol           = " "
style            = "bold yellow"
format           = "[$symbol$version( \\($virtualenv\\))]($style) "
detect_extensions = ["py"]
detect_files     = ["pyproject.toml", "Pipfile", "setup.py", "setup.cfg",
                    "requirements.txt", ".python-version", "tox.ini"]
detect_folders   = [".venv", "venv", "__pypackages__"]

# ── Conda / mamba env ─────────────────────────────────────────────────────────
[conda]
symbol           = "󰌠 "
style            = "bold green"
format           = "[$symbol$environment]($style) "
ignore_base      = true   # hide 'base' env — only show named envs

# ── Docker ───────────────────────────────────────────────────────────────────
[docker_context]
symbol = " "
style  = "bold blue"
format = "[$symbol$context]($style) "
only_with_files = true

# ── Background jobs ───────────────────────────────────────────────────────────
[jobs]
symbol    = "󰒓 "
style     = "bold blue"
threshold = 1
format    = "[$symbol$number]($style) "

# ── Command duration (show for commands > 2s) ─────────────────────────────────
[cmd_duration]
min_time           = 2000
style              = "bold yellow"
format             = "[ $duration]($style) "
show_notifications = false

# ── Disabled modules ─────────────────────────────────────────────────────────
[package]
disabled = true

[nodejs]
disabled = true

[ruby]
disabled = true

[golang]
disabled = true

[rust]
disabled = true

[java]
disabled = true
