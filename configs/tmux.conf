# =============================================================================
# ~/.tmux.conf — tmux configuration
# Plugins managed by tpm — after first install press: prefix + I
# =============================================================================

# ── Prefix key (Ctrl+a, easier than Ctrl+b) ──────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ───────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on
set -sg escape-time 0          # no delay after Escape (important for vim/micro)
set -g mouse on                # mouse support — click, scroll, resize panes

# ── Numbering ─────────────────────────────────────────────────────────────────
set -g base-index 1            # windows start at 1 not 0
setw -g pane-base-index 1
set -g renumber-windows on     # re-number when a window is closed

# ── Reload config ─────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Splitting panes (intuitive keys, opens in current dir) ───────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation (vim-style) ───────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Also allow arrow keys
bind Left  select-pane -L
bind Down  select-pane -D
bind Up    select-pane -U
bind Right select-pane -R

# ── Pane resizing ────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Copy mode (vi keys) ───────────────────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left: session name
set -g status-left-length 30
set -g status-left "#[bold,fg=#89b4fa] #S #[default]"

# Right: host, date, time
set -g status-right-length 60
set -g status-right "#[fg=#a6e3a1]#{?CONDA_DEFAULT_ENV, 󰌠 #{CONDA_DEFAULT_ENV},}#[default] #[fg=#89dceb]%a %d %b#[default] #[bold,fg=#cba6f7] %H:%M#[default] "

# Windows
setw -g window-status-format         " #I:#W "
setw -g window-status-current-format "#[bold,fg=#1e1e2e,bg=#89b4fa] #I:#W #[default]"
setw -g window-status-style          "fg=#6c7086"
setw -g window-status-current-style  ""

# Pane borders
set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# ── Plugins (tpm) ─────────────────────────────────────────────────────────────
# Install tpm: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then press: prefix + I to install plugins

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'    # sensible defaults
set -g @plugin 'tmux-plugins/tmux-resurrect'   # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'   # auto-save sessions
set -g @plugin 'tmux-plugins/tmux-yank'        # copy to system clipboard

# tmux-continuum settings
set -g @continuum-restore 'on'       # auto-restore last session on start
set -g @continuum-save-interval '15' # save every 15 min

# tmux-resurrect settings
set -g @resurrect-capture-pane-contents 'on'

# Initialise tpm (keep this line at the bottom)
run '~/.tmux/plugins/tpm/tpm'
